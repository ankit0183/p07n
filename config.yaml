# CtbCap Multi-Configuration for your models
# Save as config.yaml

global:
  save_path: "./ctbcap_rec"
  log_path: "./ctbcap_rec/log"
  save_space_mib: 512
  log_space_mib: 16
  cut_time: 0
  cut_size_mib: 0
  platform: "stripchat"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  edging_mode: false
  debug_mode: true
  ignore_proxy: false
  check_interval: 60
  retry_interval: 60
  ffmpeg_codec: "copy"
  ffmpeg_extra_args: ""

  notifications:
    enabled: false
    telegram:
      enabled: false
      bot_token: ""
      chat_id: ""
    discord:
      enabled: false
      webhook_url: ""
    ntfy:
      enabled: false
      topic: ""
      server: "https://ntfy.sh"

  metadata:
    enabled: true
    log_path: "./ctbcap_rec/log/metadata.jsonl"

  health_check:
    enabled: true
    port: 8080

